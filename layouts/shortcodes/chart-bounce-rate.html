<svg viewBox="0 0 700 260" width="100%" style="max-width:700px; display:block; margin:0 auto;" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bounce-chart-title"><title id="bounce-chart-title">페이지 로드 시간에 따른 이탈 확률 증가 (Google/SOASTA, 2017)</title><text x="10" y="20" font-size="13" fill="var(--color-text-muted)">로드 시간이 1초에서 늘어날 때, 이탈 확률 증가폭</text><text x="10" y="55" font-size="13" fill="var(--color-text)">1s → 3s</text><rect x="90" y="42" width="140" height="18" rx="3" fill="var(--color-accent)" opacity="0.4" /><text x="240" y="55" font-size="12" fill="var(--color-text-muted)">+32%</text><text x="10" y="95" font-size="13" fill="var(--color-text)">1s → 5s</text><rect x="90" y="82" width="395" height="18" rx="3" fill="var(--color-accent)" opacity="0.6" /><text x="495" y="95" font-size="12" fill="var(--color-text-muted)">+90%</text><text x="10" y="135" font-size="13" fill="var(--color-text)">1s → 6s</text><rect x="90" y="122" width="465" height="18" rx="3" fill="var(--color-accent)" opacity="0.8" /><text x="565" y="135" font-size="12" fill="var(--color-text-muted)">+106%</text><text x="10" y="175" font-size="13" fill="var(--color-text)">1s → 10s</text><rect x="90" y="162" width="540" height="18" rx="3" fill="var(--color-accent)" /><text x="640" y="175" font-size="12" fill="var(--color-text-muted)">+123%</text><text x="10" y="215" font-size="12" fill="var(--color-text-muted)">로드 시간이 1초에서 5초로만 늘어나도 이탈 확률이 90% 가까이 뛴다 — 완만한 곡선이 아니라 가파른 절벽이다.</text></svg>
